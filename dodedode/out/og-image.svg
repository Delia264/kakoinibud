<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="#3B82F6" opacity="0.1"/>
  <circle cx="1100" cy="530" r="300" fill="#8B5CF6" opacity="0.1"/>
  
  <!-- Main content container -->
  <g transform="translate(100, 150)">
    <!-- Name -->
    <text x="0" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="bold" fill="#ffffff">
      Иван Иванов
    </text>
    
    <!-- Role -->
    <text x="0" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="48" fill="#3B82F6">
      Frontend Разработчик
    </text>
    
    <!-- Description -->
    <text x="0" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="#94a3b8">
      Next.js • TypeScript • React
    </text>
    
    <!-- URL -->
    <text x="0" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#64748b">
      username.github.io/portfolio
    </text>
  </g>
  
  <!-- Decorative line -->
  <line x1="100" y1="450" x2="1100" y2="450" stroke="url(#accent)" stroke-width="4" opacity="0.5"/>
  
  <!-- Tech icons representation -->
  <g transform="translate(100, 500)">
    <rect x="0" y="0" width="80" height="80" rx="16" fill="#3B82F6" opacity="0.2"/>
    <text x="40" y="50" text-anchor="middle" font-family="system-ui" font-size="40" fill="#3B82F6">N</text>
    
    <rect x="100" y="0" width="80" height="80" rx="16" fill="#3178C6" opacity="0.2"/>
    <text x="140" y="50" text-anchor="middle" font-family="system-ui" font-size="40" fill="#3178C6">TS</text>
    
    <rect x="200" y="0" width="80" height="80" rx="16" fill="#61DAFB" opacity="0.2"/>
    <text x="240" y="50" text-anchor="middle" font-family="system-ui" font-size="40" fill="#61DAFB">R</text>
  </g>
</svg>
